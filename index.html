<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Artesanias Ludys</title>
</head>

<body>
    <header class="header">
        <div class="logo">Artesanías Ludys</div>

        <nav class="nav">
            <a href="#">Inicio</a>
            <a href="#">Productos</a>
            <a href="#">Historia</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>Artesanías hechas a mano</h1>
            <p>Tradición, cultura y diseño en cada pieza</p>
            <div class="hero-buttons">
                <button>Ver productos</button>
                <button class="btn-secondary">Contactar</button>
            </div>
        </div>
    </section>

    <!-- PRODUCTS SECTION -->

    <section class="productos">
        <h2>Productos destacados</h2>

        <div class="grid-productos">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="">
                <h3>Mochila artesanal</h3>
                <p>$45</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" alt="">
                <h3>Collar hecho a mano</h3>
                <p>$20</p>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0" alt="">
                <h3>Decoración artesanal</h3>
                <p>$30</p>
            </div>

        </div>
    </section>


</body>

</html>
