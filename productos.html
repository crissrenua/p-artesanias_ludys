<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Productos</title>
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo" style="text-decoration: none;">Artesanías Ludys</a>

        <nav class="nav">
            <a href="index.html" class="active">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="blog.html">Blog</a>
            <a href="historia.html">Historia</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="catalogo-wrapper">
        <header class="seccion-header">
            <span>Nuestra Colección Completa</span>
            <h1>Catálogo de Artesanías</h1>
            <div class="linea-decorativa"></div>
        </header>

        <nav class="filtros-container">
            <button class="filter-btn active">Todos</button>
            <button class="filter-btn">Mochilas</button>
            <button class="filter-btn">Accesorios</button>
            <button class="filter-btn">Hogar</button>
            <button class="filter-btn">Ofertas</button>
        </nav>

        <div class="grid-productos catalogo">
            <article class="producto-card">
                <div class="producto-img-wrapper">
                    <img src="img/producto1.jpg" alt="Mochila">
                    <div class="badge">Más vendido</div>
                </div>
                <div class="producto-info">
                    <h3>Mochila Wayúu Gala</h3>
                    <p class="precio">$45.00</p>
                    <a href="producto-detalle.html" class="btn-ver">Ver Detalles</a>
                </div>
            </article>

            <article class="producto-card">
                <div class="producto-img-wrapper">
                    <img src="img/producto2.jpg" alt="Collar">
                </div>
                <div class="producto-info">
                    <h3>Collar de Semillas</h3>
                    <p class="precio">$20.00</p>
                    <a href="producto-detalle.html" class="btn-ver">Ver Detalles</a>
                </div>
            </article>

            <article class="producto-card">
                <div class="producto-img-wrapper">
                    <img src="img/producto3.jpg" alt="Vasija">
                </div>
                <div class="producto-info">
                    <h3>Vasija de Barro</h3>
                    <p class="precio">$30.00</p>
                    <a href="producto-detalle.html" class="btn-ver">Ver Detalles</a>
                </div>
            </article>

            <article class="producto-card">
                <div class="producto-img-wrapper">
                    <img src="img/producto4.jpg" alt="Hamaca">
                </div>
                <div class="producto-info">
                    <h3>Hamaca Tejida Algodón</h3>
                    <p class="precio">$85.00</p>
                    <a href="producto-detalle.html" class="btn-ver">Ver Detalles</a>
                </div>
            </article>
        </div>
    </main>

</body>

</html>
